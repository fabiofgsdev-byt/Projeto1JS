<!DOCTYPE html>
<html lang="pt-Br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>projetoJ-S1</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img src="./assets/logo.gif" alt="Logo do projeto" class="logo">

    <main>
        <label>
            coverter <b> de </b>
            <select>
                <option>R$ Real brasileiro</option>
            </select>
        </label>

        <label>
            coverter <b> para </b>
            <select class="select-convert">
                <option value="dolar">US$ Dolar americano</option>
                <option value="euro"> € Euro</option>
                <option value="real">R$ Real brasileiro</option>
                <option value="libra"> £ Libra</option>
            </select>
        </label>

        <label>
            valor
            <input class="input-currency" placeholder="10.000,00">
        </label>

        <button class="convert-button">Converter</button>

        <section>
            <div class="currency-box">
                <img src="./assets/real.png" alt="moeda a ser convertida">
                <p class="currency">Real</p>
                <p class="currency-value-to-convert">R$ 0,00</p>
            </div>

            <img class="seta" src="./assets/Vector.svg" alt="seta de conversão">

         
            <div class="currency-box">
                <img class="currency-img" src="./assets/dolar.png" alt="moeda a ser convertida">
                <p class="currency" id="currency-name">Dolar</p>
                <p class="currency-value">US$ 0,00</p>
            </div>
        </section>


    </main>



</body>

<script src="./scripts.js"></script>

</html>
